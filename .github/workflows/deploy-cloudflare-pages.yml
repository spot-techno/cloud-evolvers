name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - "master"
      - "**"
  # No pull_request trigger on purpose: this job runs on a persistent
  # self-hosted runner that holds deploy credentials, so it must only execute
  # code from branches pushed by trusted collaborators (push needs write
  # access). Fork PRs must never run here. Branch pushes still build and
  # deploy the test preview.
  workflow_dispatch:

concurrency:
  group: deploy-cf-${{ github.ref_name == 'master' && 'master' || 'test' }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: [self-hosted, linux, x64, podman, logan-laptop, beefy]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Lint (non-blocking during cleanup)
        run: |
          bun run lint || echo "::warning::Lint has issues (88+ errors remain, mostly unused imports/anys in legacy graph code). Run 'bun run lint' locally and clean per CLAUDE.md."
        continue-on-error: true

      - name: Type check (non-blocking)
        run: |
          bunx tsc -b --noEmit || echo "::warning::TypeScript issues detected (note: production build uses tsc --noCheck)"
        continue-on-error: true

      - name: Set build date
        id: build-date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_ENVIRONMENT: ${{ github.ref_name == 'master' && 'production' || 'preview' }}
          VITE_BUILD_DATE: ${{ steps.build-date.outputs.date }}
          VITE_FORM_API_KEY: ${{ secrets.FORM_API_KEY }}

      # Project-level Pages secrets are global, not per-deployment, so they
      # only need to be set from master. Gating these keeps FORM_API_KEY,
      # EMAIL_CLIENT_SECRET and ADMIN_PASSWORD out of every feature-branch job.
      - name: Set FORM_API_KEY secret
        if: github.ref_name == 'master'
        run: echo "$FORM_API_KEY" | bunx wrangler pages secret put FORM_API_KEY --project-name cloud-evolvers-train
        env:
          FORM_API_KEY: ${{ secrets.FORM_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set EMAIL_CLIENT_SECRET secret
        if: github.ref_name == 'master'
        run: echo "$EMAIL_CLIENT_SECRET" | bunx wrangler pages secret put EMAIL_CLIENT_SECRET --project-name cloud-evolvers-train
        env:
          EMAIL_CLIENT_SECRET: ${{ secrets.EMAIL_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set ADMIN_PASSWORD secret
        if: github.ref_name == 'master'
        run: echo "$ADMIN_PASSWORD" | bunx wrangler pages secret put ADMIN_PASSWORD --project-name cloud-evolvers-train
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -e
          # master -> production branch on Pages (serves cloudevolvers.com).
          # any other branch -> collapse to the stable "test" branch alias,
          # so https://test.cloud-evolvers-train.pages.dev (and the
          # test.cloudevolvers.com custom domain bound to it) always serves
          # the latest non-master commit pushed to GitHub.
          if [[ "$GITHUB_REF_NAME" == "master" ]]; then
            TARGET_BRANCH="master"
          else
            TARGET_BRANCH="test"
          fi
          echo "Deploying $GITHUB_REF_NAME -> Pages branch '$TARGET_BRANCH'..."

          OUTPUT=$(bunx wrangler pages deploy dist --project-name=cloud-evolvers-train --branch="$TARGET_BRANCH" 2>&1)
          echo "$OUTPUT"

          DEPLOYMENT_URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | head -1 || echo "")
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Deployment successful: $DEPLOYMENT_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Verify deployment
        if: github.ref_name == 'master'
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30

          RESPONSE=$(curl -s -w "\n%{http_code}" "https://cloudevolvers.com/api/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Health check HTTP status: $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi

          if echo "$BODY" | grep -q "missing"; then
            echo "::error::Some environment variables are missing"
            exit 1
          fi

          echo "Deployment verified successfully"

      - name: Deployment Summary
        if: success()
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          echo "## Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | cloud-evolvers-train |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | $REF_NAME |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | $COMMIT_SHA |" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$REF_NAME" == "master" ]]; then
            echo "| URL | https://cloudevolvers.com |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| URL | https://test.cloudevolvers.com |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Preview | $DEPLOY_URL |" >> "$GITHUB_STEP_SUMMARY"
          fi
