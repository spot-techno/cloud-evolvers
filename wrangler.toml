name = "cloud-evolvers-train"
main = "worker/index.ts"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]

# Worker secrets required before go-live:
#   bunx wrangler secret put FORM_API_KEY
#   bunx wrangler secret put EMAIL_CLIENT_SECRET
#   bunx wrangler secret put ADMIN_PASSWORD

routes = [
  { pattern = "cloudevolvers.com/*", zone_name = "cloudevolvers.com" },
  { pattern = "www.cloudevolvers.com/*", zone_name = "cloudevolvers.com" },
  { pattern = "cloudevolvers.nl/*", zone_name = "cloudevolvers.nl" },
  { pattern = "www.cloudevolvers.nl/*", zone_name = "cloudevolvers.nl" },
]

[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

# Common vars shared by all environments
[vars]
NODE_ENV = "production"
VITE_SHOW_CONSTRUCTION_BANNER = "false"
VITE_ENVIRONMENT = "production"
VITE_SITE_URL = "https://cloudevolvers.com"
EMAIL_TENANT_ID = "34dd9821-1508-4858-974c-e5fd1493a58f"
EMAIL_CLIENT_ID = "61cfceb9-9bf4-456c-8170-2a4a521abf8d"
EMAIL_SENDER_ADDRESS = "hello@cloudevolvers.com"

# D1 Database binding (single top-level environment).
# The Worker is deployed top-level (`wrangler deploy`, no --env). Per-env
# blocks were removed in the Pages->Worker migration: keeping duplicate
# `routes` under [env.production] would let a stray `wrangler deploy --env
# production` spawn a second Worker claiming cloudevolvers.com and conflict.
[[d1_databases]]
binding = "PRICING_DB"
database_name = "cloud-evolvers-pricing"
database_id = "c07b171f-987f-4d91-9126-64663b107611"

# Production custom domains: cloudevolvers.com, www.cloudevolvers.com,
# cloudevolvers.nl, www.cloudevolvers.nl (served via the routes above).
# test.cloudevolvers.com (Pages branch preview) is retired by this migration.
