name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - "master"
      - "**"
  # No pull_request trigger on purpose: this job runs on a persistent
  # self-hosted runner that holds deploy credentials, so it must only execute
  # code from branches pushed by trusted collaborators (push needs write
  # access). Fork PRs must never run here. Non-master branches build only
  # (a CI check); the Worker is deployed from master exclusively, because a
  # Worker route claims the live domain (there is no per-branch preview alias
  # like Pages provided — test.cloudevolvers.com is retired by this migration).
  workflow_dispatch:

concurrency:
  group: deploy-cf-${{ github.ref_name == 'master' && 'master' || 'test' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: [self-hosted, linux, x64, spot-tech-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Lint (non-blocking during cleanup)
        run: |
          bun run lint || echo "::warning::Lint has issues (88+ errors remain, mostly unused imports/anys in legacy graph code). Run 'bun run lint' locally and clean per CLAUDE.md."
        continue-on-error: true

      - name: Type check (non-blocking)
        run: |
          bunx tsc -b --noEmit || echo "::warning::TypeScript issues detected (note: production build uses tsc --noCheck)"
        continue-on-error: true

      - name: Set build date
        id: build-date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_ENVIRONMENT: ${{ github.ref_name == 'master' && 'production' || 'preview' }}
          VITE_BUILD_DATE: ${{ steps.build-date.outputs.date }}
          VITE_FORM_API_KEY: ${{ secrets.FORM_API_KEY }}

      # ---- Deploy the Worker (master only) ----
      # A Worker route claims the live domain, so feature branches must not
      # deploy. The deploy creates/updates the `cloud-evolvers-train` Worker and
      # binds the static assets (dist/) + D1 (PRICING_DB) + routes from
      # wrangler.toml. Worker routes take precedence over the old Pages custom
      # domains, so this cuts cloudevolvers.com over automatically.
      - name: Deploy Worker
        id: deploy
        if: github.ref_name == 'master'
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ---- Worker secrets (master only, after the Worker exists) ----
      # Applied live without a redeploy. Same GitHub Actions secrets the old
      # Pages deploy used; now set as Worker secrets instead of Pages secrets.
      - name: Set FORM_API_KEY secret
        if: github.ref_name == 'master'
        run: echo "$FORM_API_KEY" | bunx wrangler secret put FORM_API_KEY
        env:
          FORM_API_KEY: ${{ secrets.FORM_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set EMAIL_CLIENT_SECRET secret
        if: github.ref_name == 'master'
        run: echo "$EMAIL_CLIENT_SECRET" | bunx wrangler secret put EMAIL_CLIENT_SECRET
        env:
          EMAIL_CLIENT_SECRET: ${{ secrets.EMAIL_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set ADMIN_PASSWORD secret
        if: github.ref_name == 'master'
        run: echo "$ADMIN_PASSWORD" | bunx wrangler secret put ADMIN_PASSWORD
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        if: github.ref_name == 'master'
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30

          RESPONSE=$(curl -s -w "\n%{http_code}" "https://cloudevolvers.com/api/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Health check HTTP status: $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi

          if echo "$BODY" | grep -q "missing"; then
            echo "::error::Some environment variables are missing"
            exit 1
          fi

          echo "Deployment verified successfully"

      - name: Deployment Summary
        if: success() && github.ref_name == 'master'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "## Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker | cloud-evolvers-train |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | $COMMIT_SHA |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://cloudevolvers.com |" >> "$GITHUB_STEP_SUMMARY"
