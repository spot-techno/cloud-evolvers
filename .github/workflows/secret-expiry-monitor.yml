name: Secret & Auth Health Monitor

on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-auth-health:
    # mbrother aggressive rollout (local gh CLI): migrated to logan-laptop + Podman
    runs-on: [self-hosted, linux, x64, spot-tech-ci]
    steps:
      - name: Test Azure AD Authentication
        id: auth-check
        env:
          FORM_API_KEY: ${{ secrets.FORM_API_KEY }}
        run: |
          echo "Testing Azure AD auth via /api/monitor..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://cloudevolvers.com/api/monitor?alert=true" \
            -H "x-api-key: $FORM_API_KEY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=healthy" >> "$GITHUB_OUTPUT"
            echo "message=Azure AD authentication is working correctly." >> "$GITHUB_OUTPUT"
          else
            STATUS=$(echo "$BODY" | jq -r '.message // "Unknown error"' 2>/dev/null || echo "Endpoint returned HTTP $HTTP_CODE")
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=$STATUS" >> "$GITHUB_OUTPUT"
          fi

      - name: Test Form Submission Endpoint
        id: form-check
        env:
          FORM_API_KEY: ${{ secrets.FORM_API_KEY }}
        run: |
          echo "Testing form submission pipeline..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://cloudevolvers.com/api/submit-consultation" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $FORM_API_KEY" \
            -d '{"name":"Health Check Bot","email":"monitor@cloudevolvers.com","training":"Automated Health Check - please ignore","language":"en"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "form_ok=true" >> "$GITHUB_OUTPUT"
          else
            FORM_ERR=$(echo "$BODY" | jq -r '.error // .details // "Unknown"' 2>/dev/null)
            echo "form_ok=false" >> "$GITHUB_OUTPUT"
            echo "form_error=$FORM_ERR" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue on Failure
        if: steps.auth-check.outputs.status == 'error' || steps.form-check.outputs.form_ok == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          AUTH_STATUS: ${{ steps.auth-check.outputs.status }}
          AUTH_MESSAGE: ${{ steps.auth-check.outputs.message }}
          FORM_OK: ${{ steps.form-check.outputs.form_ok }}
          FORM_ERROR: ${{ steps.form-check.outputs.form_error }}
        with:
          script: |
            const authStatus = process.env.AUTH_STATUS;
            const authMessage = process.env.AUTH_MESSAGE;
            const formOk = process.env.FORM_OK === 'true';
            const formError = process.env.FORM_ERROR || 'Unknown';
            const now = new Date().toISOString();

            // Don't create duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auth-alert'
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Weekly check still failing (${now}):\n- Auth: ${authStatus}\n- Form: ${formOk ? 'OK' : formError}`
              });
              return;
            }

            const body = [
              '## 🚨 ACTION REQUIRED — Cloud Evolvers email auth FAILED',
              '',
              `**Detected:** ${now}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Azure AD Auth | ${authStatus === 'healthy' ? 'OK' : 'FAILED: ' + authMessage} |`,
              `| Form Submission | ${formOk ? 'OK' : 'FAILED: ' + formError} |`,
              '',
              'The contact form cannot send mail. Lead submissions are being lost until this is fixed.',
              '',
              '### Most likely cause: stale `EMAIL_CLIENT_SECRET`',
              '',
              'Mail is sent via the **Cloud Evolvers Mail Sender** SPN',
              '(`15f26f15-81a0-42bd-8827-348cd7736504`). Its secret value lives in',
              '**Azure Key Vault** `spotcloud-global-kv/cloudevolvers-mail-spn-secret`.',
              '',
              '**To fix:**',
              '1. `az keyvault secret show --vault-name spotcloud-global-kv --name cloudevolvers-mail-spn-secret --query value -o tsv`',
              '2. Update the GitHub Actions secret `EMAIL_CLIENT_SECRET` in this repo with that value.',
              '3. Re-run the deploy workflow (or `wrangler secret put EMAIL_CLIENT_SECRET` on the `cloud-evolvers-train` Worker).',
              '4. Confirm `https://www.cloudevolvers.com/api/monitor` (with `x-api-key`) returns 200.',
              '',
              'If the SPN secret itself has truly expired, rotate it in the',
              '[Azure Portal app registration](https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps/ApplicationMenuBlade/~/Credentials/appId/15f26f15-81a0-42bd-8827-348cd7736504),',
              'store the new value in the Key Vault secret above, then redo steps 1-4.',
              '',
              '---',
              '*Auto-created by Secret & Auth Health Monitor*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 ACTION REQUIRED: Cloud Evolvers email auth failed - form submissions broken',
              body,
              labels: ['auth-alert', 'critical']
            });

      - name: Summary
        env:
          AUTH_RESULT: ${{ steps.auth-check.outputs.status }}
          FORM_RESULT: ${{ steps.form-check.outputs.form_ok }}
        run: |
          echo "## Auth Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure AD Auth | $AUTH_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$FORM_RESULT" = "true" ]; then
            echo "| Form Submission | OK |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Form Submission | FAILED |" >> "$GITHUB_STEP_SUMMARY"
          fi