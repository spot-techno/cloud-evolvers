# Managed by spot-techno/.github sync-pr-review-workflows (profile: generic)
name: Grok Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: grok-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: vars.GROK_REVIEW_ENABLED == 'true'
    uses: spot-techno/.github/.github/workflows/reusable-grok-review.yml@master
    secrets: inherit
    with:
      prompt_profile: generic
